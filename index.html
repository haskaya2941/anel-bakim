<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anel Bakım</title>
    <style>
        body { font-family: sans-serif; background: #eceff1; padding: 10px; margin: 0; }
        .card { background: white; border-radius: 15px; max-width: 450px; margin: auto; border-top: 6px solid #1a237e; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #1a237e; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #37474f; }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 2px solid #cfd8dc; font-size: 16px; box-sizing: border-box; }
        #btn-gonder { width: 100%; padding: 15px; margin-top: 20px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; background: #1a237e; color:white; cursor: pointer; }
        .item-group { margin-top: 15px; background: #e8eaf6; padding: 15px; border-radius: 10px; border-left: 5px solid #1a237e; }
        .item-group.error { border-left: 5px solid #d32f2f; background: #ffebee; }
        .item { display: flex; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #d1d9e6; }
        input[type="checkbox"] { width: 24px; height: 24px; margin-right: 12px; flex-shrink: 0; }
        .hidden { display: none; }
        #login-section { text-align: center; }
        
        /* YENİ EKLENEN FOTOĞRAF CSS'İ */
        .file-upload-container { margin-top: 15px; padding: 15px; border: 2px dashed #1a237e; border-radius: 8px; text-align: center; background: #f8f9fa; }
        .file-upload-container input[type="file"] { display: none; }
        .file-upload-label { cursor: pointer; color: #1a237e; font-weight: bold; display: inline-block; padding: 10px; }
        #foto-onizleme { max-width: 100%; height: auto; margin-top: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h2 id="baslik">ANEL BAKIM</h2>
        <input type="text" id="manual_kod" placeholder="KOD..." oninput="kodDegisti()" style="text-align:center; text-transform:uppercase; font-weight:bold; border:none; padding:8px; width:85%; border-radius: 4px;">
    </div>
    <div class="content">
        <div id="login-section">
            <label>Personel Seçiniz:</label>
            <select id="p_name">
                <option value="Harun Özüpek">Harun Özüpek</option>
                <option value="Fatih Kır">Fatih Kır</option>
                <option value="Mehmet Emin Tunçay">Mehmet Emin Tunçay</option>
                <option value="Cengiz Küçük">Cengiz Küçük</option>
                <option value="Hasan Kaya">Hasan Kaya</option>
            </select>
            <label>Şifre:</label>
            <input type="number" id="pass" placeholder="****" inputmode="numeric">
            <button type="button" onclick="giris()" style="width:100%; padding:15px; margin-top:20px; border-radius:8px; background:#455a64; color:white; border:none; font-weight:bold; cursor: pointer;">SİSTEME GİRİŞ YAP</button>
        </div>

        <div id="main-form" class="hidden">
            <label>Bakım Periyodu:</label>
            <select id="pt" onchange="renderItems()">
                <option value="">Seçiniz...</option>
                <option value="Günlük">Günlük</option>
                <option value="Haftalık">Haftalık</option>
                <option value="Aylık">Aylık</option>
                <option value="3 Aylık">3 Aylık</option>
                <option value="6 Aylık">6 Aylık</option>
                <option value="Yıllık">Yıllık</option>
            </select>
            <div id="dynamic-items"></div>
            
            <!-- YENİ EKLENEN FOTOĞRAF HTML'İ -->
            <label>Müdahale / Söküm Fotoğrafı (Opsiyonel):</label>
            <div class="file-upload-container">
                <label class="file-upload-label" for="fotoInput">📸 Kamerayı Aç / Fotoğraf Seç</label>
                <input type="file" id="fotoInput" accept="image/*" capture="environment" onchange="fotoSecildi(event)">
                <img id="foto-onizleme" alt="Seçilen Fotoğraf">
            </div>

            <label>Notlar:</label>
            <textarea id="f_notlar" rows="3"></textarea>
            <button type="button" id="btn-gonder" onclick="veriyiGonder()">✅ KAYDI TAMAMLA</button>
        </div>
    </div>
</div>

01.35\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 ÇALIŞMA ÖNCESI MAKINE ÇEVRESI TEMIZLENIR,IŞLE ILGILI OLMAYAN MALZEMELER KALDIRILIR.\n• MADDE-2 MAKINANIN ENERJI BESLEME NOKTASI VE HAVA BASINCININ KONTROLÜ YAPILIR.\n• MADDE-3 KALIPTA VE HAREKETLI PARÇALARDA(KIZAK,MAFZAL,BIÇAK) YAĞLAMA YAPILIR.BESLEME MEKANIZMALARI (TERMINAL ŞERIDI) AKIŞ YOLU TEMIZLIĞI YAPILIR.\n• MADDE-4 BESLEME MEKANIZMALARI (TERMINAL ŞERIDI) AKIŞ YOLU TEMIZLIĞI YAPILIR.\n• MADDE-5 MAKINAYA AIT SENSÖR KONTROLÜ YAPILARAK MAKINE TEST ÇAKIMI YAPILIR.HERHANGI BIR SORUN YOK ISE ÜRETIME UYGUN OLUR.\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• SIYIRMA ÜNITESINDEKI V-BIÇAKLARIN ARASINA SIKIŞAN PLASTIK KABLO ÇÖPLERI HAVA ILE TEMIZLENIR.\n• KABLOYU SIYIRAN BIÇAKLARIN AĞZINA BAKILIR; KÖRLENMIŞSE KABLOYU KOPARIR, DEĞIŞTIRILIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• KABLOYU TUTUP GÖTÜREN KOLLARIN (TRANSFER KOLU) KIZAK MILLERI INCE GRESLE YAĞLANIR.\n• TERMINAL ÇAKAN PRESIN (RAM) INIP KALKAN YÜZEYLERI YAĞLANIR.\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• MOTOR KAYIŞLARININ GERGINLIĞI ELLE KONTROL EDILIR, GEVŞEKSE AYARLANIR.\n• KABLO SÜREN TEKERLEKLERIN (ROLLER) BASKISI KONTROL EDILIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• KABLO TUTUCU ÇENELERIN (GRIPPER) YAYLARI KONTROL EDILIR\n• TERMINAL ÇAKMA YÜKSEKLIĞI KONTROL EDILIR (GEVŞEME VARSA TERMINALI EZMEZ VEYA ÇOK EZER).\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• ELEKTRIK PANOSUNDAKI FANLAR VE HAVA KANALLARI TEMIZLENIR (ISINMAYI ÖNLEMEK IÇIN).\n• TÜM ELEKTRIK KLEMENSLERI VE MAKINE VIDALARI GEVŞEMEYE KARŞI TORNAVIDA ILE YOKLANIR.\n\n==============================": "S-MKN.A01.01.35", "🛠️ OTOMATIK TERMINAL ÇAKMA MAKINESI (BOZHIWANG BZW-1.0)\nKOD: S-MKN.A01.01.36\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 ÇALIŞMA ÖNCESI MAKINE ÇEVRESI TEMIZLENIR,IŞLE ILGILI OLMAYAN MALZEMELER KALDIRILIR.\n• MADDE-2 MAKINANIN ENERJI BESLEME NOKTASI VE HAVA BASINCININ KONTROLÜ YAPILIR.\n• MADDE-3 KALIPTA VE HAREKETLI PARÇALARDA(KIZAK,MAFZAL,BIÇAK) YAĞLAMA YAPILIR.BESLEME MEKANIZMALARI (TERMINAL ŞERIDI) AKIŞ YOLU TEMIZLIĞI YAPILIR.\n• MADDE-4 BESLEME MEKANIZMALARI (TERMINAL ŞERIDI) AKIŞ YOLU TEMIZLIĞI YAPILIR.\n• MADDE-5 MAKINAYA AIT SENSÖR KONTROLÜ YAPILARAK MAKINE TEST ÇAKIMI YAPILIR.HERHANGI BIR SORUN YOK ISE ÜRETIME UYGUN OLUR.\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• SIYIRMA ÜNITESINDEKI V-BIÇAKLARIN ARASINA SIKIŞAN PLASTIK KABLO ÇÖPLERI HAVA ILE TEMIZLENIR.\n• KABLOYU SIYIRAN BIÇAKLARIN AĞZINA BAKILIR; KÖRLENMIŞSE KABLOYU KOPARIR, DEĞIŞTIRILIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• KABLOYU TUTUP GÖTÜREN KOLLARIN (TRANSFER KOLU) KIZAK MILLERI INCE GRESLE YAĞLANIR.\n• TERMINAL ÇAKAN PRESIN (RAM) INIP KALKAN YÜZEYLERI YAĞLANIR.\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• MOTOR KAYIŞLARININ GERGINLIĞI ELLE KONTROL EDILIR, GEVŞEKSE AYARLANIR.\n• KABLO SÜREN TEKERLEKLERIN (ROLLER) BASKISI KONTROL EDILIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• KABLO TUTUCU ÇENELERIN (GRIPPER) YAYLARI KONTROL EDILIR\n• TERMINAL ÇAKMA YÜKSEKLIĞI KONTROL EDILIR (GEVŞEME VARSA TERMINALI EZMEZ VEYA ÇOK EZER).\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• TERMINAL ÇAKMA ÜNITESI (APLIKATÖR) REVIZE EDILIR; AŞINMIŞ ALT KESICI ÖRS (ANVIL)/ÜST KESICI ZIMBA (PUNCH) UÇLARI YENILENIR.\n• MAKINE ŞASISI VE ANA MIL EKSENEL BOŞLUKLARI KONTROL EDILEREK KALIBRE EDILIR.\n\n==============================": "S-MKN.A01.01.36", "🛠️ PUNTA MAKINESI (TERMINALLI SINYAL)\nKOD: S-MKN.A01.02.01\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 MAKINE ÇALIŞILACAK BÖLGESI KONTROL EDILEREK ORTAM ÇALIŞMAYA UYGUN HALE GETIRILIR.\n• MADDE-2 SOĞUTMA SUYU , HAVA  BAĞLANTILARI KONTROL EDILIR.PROBLEM VARSA YETKILIYE BILDIRILIR.\n• MADDE-3 PUNTA KAYNAK UÇLARI KONTROL EDILIR,YANMA,ÇATLAMA AŞINMA VARSA TAMIRINI YAPTIRILIR.\n• MADDE-4 DIŞ BÖLGEDE ÇALIŞAN YAPRAK BAKIR BARALARI KONTROL ET.YIRTILMA , GEVŞEME ,SIYAHLAŞMA VARSA YETKILIYE BILDIREREK TAMIRINI SAĞLA.\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• BAKIR KOLLARIN VE UÇLARIN (ELEKTROT) BAĞLANTI YERLERI TEMIZLENIR, OKSITLENME (YEŞERME) VAR MI BAKILIR.\n• SU HORTUMLARINDA VE REKORLARDA ÇATLAK, SU KAÇAĞI VAR MI GÖZLE KONTROL EDILIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• ELEKTRIK KABLO IZOLASYONU VE ŞASE BAĞLANTILARI KONTROL EDILIR.\n• PEDAL MEKANIZMASI (VEYA AYAK BUTONU) TAKILIYOR MU, KABLOSUNDA EZIK VAR MI KONTROL EDILIR.\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• PUNTA UÇLARININ BIRBIRINE TAM MERKEZDE (AYNI HIZADA) BASIP BASMADIĞI KONTROL EDILIR, KAÇIKSA AYARLANIR.\n• TRAFO KADEME ŞALTERININ (AYAR DÜĞMESI) GEÇIŞLERI KONTROL EDILIR, GEVŞEKLIK VARSA SIKILIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• TRAFO SOĞUTMA KANALLARI KIREÇLENME VE TIKANIKLIĞA KARŞI KONTROL EDILIR.\n• PANO IÇI KLEMENS SIKILIKLARI VE TRISTÖR BAĞLANTILARI KONTROL EDILIR.\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• MAKINE IÇI AÇILIR, GEREKLI ELEKTRIK AKSAMLARIN BAĞLANTILARI,TEMIZLIĞI YAPILIR.\n• TRAFO SARGILARI TEMIZLENIR VE MAKINENIN GENEL FONKSIYON TESTI YAPILIR.\n\n==============================": "S-MKN.A01.02.01", "🛠️ 9'LU ANAHTAR PIM ÇAKMA MAKINESI (VENÜS BANTI)\nKOD: S-MKN.A01.02.03.07\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 MAKINANIN ÇEVRE GÜVENLIĞI SAĞLANIR.ARDINDAN FIKSTÜR,YUVA VE SENSÖR TEMIZLIĞI YAPILIR.SON OLARAK GENEL MAKINE TEMIZLIĞI YAPILIR.\n• MADDE-2 PIM ITICI UÇLARDA  EĞILME KIRILMA DEFORMASYON VARMI KONTROL EDILIR.\n• MADDE-3 PNÖMATIK/HIDROLIK SIZDIRMAZLIK VE BASINÇ KONTROLÜ YAPILIR.\n• MADDE-4 ACIL STOP BUTONU ,ÇIFT EL BUTONU (VAR ISE IŞIK PERDESI)  VE KORUYUCU KAPAĞIN SAĞLAMLIK KONTROLÜ YAPILIR.BUNLARDAN HERHANGI BIRINDE SORUN VAR ISE YETKILIYE BILDIRILIR:\n• MADDE-5 NUMUNE PARÇA TEST EDILIR KALITE KONTROL SAĞLANDIKTAN SONRA MAKINE ÜRETIME HAZIR HALE GELIR.\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• FIKSTÜR YUVASI, PISTON UCU VE ITICI PIMLER ÇAPAKLARDAN TEMIZLENIR.\n• SISTEM ÇALIŞMA BASINCI (BAR) VE ŞARTLANDIRICI YAĞ SEVIYESI KONTROL EDILIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• ÜST ÇENEYI HAREKET ETTIREN PISTON MILI VE HAREKETLI KISIMLAR INCE YAĞ ILE YAĞLANIR.\n• HAREKETLI MIL, KILAVUZ BURÇLAR VE SÜTUNLAR GRES ILE YAĞLANIR.\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• EMNIYET SWITCH VE PANO BAĞLANTILARI KONTROL EDILIR.\n• PNÖMATIK HORTUM VE REKORLARDA HAVA KAÇAĞI/EZILME KONTROLÜ YAPILIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• FIKSTÜR BLOKLARI VE ALT TABLA CIVATALARININ TORK (SIKILIK) KONTROLÜ YAPILIR.\n• İTICI UÇLARDA (PUSH ROD) EĞILME, ÇATLAK VEYA AŞINMA KONTROLÜ YAPILIR.\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• SILINDIR IÇI KEÇE VE SIZDIRMAZLIK ELEMANLARININ ÖMÜR KONTROLÜ YAPILIR.\n• MEKANIK GÖVDE PARALELLIĞI VE EKSEN HIZALAMASI  KONTROL EDILIR.\n\n==============================": "S-MKN.A01.02.03.07", "🛠️ PUNTA MAKINESI (TERMINALLI SINYAL)\nKOD: S-MKN.A01.02.04\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 MAKINE ÇALIŞILACAK BÖLGESI KONTROL EDILEREK ORTAM ÇALIŞMAYA UYGUN HALE GETIRILIR.\n• MADDE-2 SOĞUTMA SUYU , HAVA  BAĞLANTILARI KONTROL EDILIR.PROBLEM VARSA YETKILIYE BILDIRILIR.\n• MADDE-3 PUNTA KAYNAK UÇLARI KONTROL EDILIR,YANMA,ÇATLAMA AŞINMA VARSA TAMIRINI YAPTIRILIR.\n• MADDE-4 DIŞ BÖLGEDE ÇALIŞAN YAPRAK BAKIR BARALARI KONTROL ET.YIRTILMA , GEVŞEME ,SIYAHLAŞMA VARSA YETKILIYE BILDIREREK TAMIRINI SAĞLA.\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• BAKIR KOLLARIN VE UÇLARIN (ELEKTROT) BAĞLANTI YERLERI TEMIZLENIR, OKSITLENME (YEŞERME) VAR MI BAKILIR.\n• SU HORTUMLARINDA VE REKORLARDA ÇATLAK, SU KAÇAĞI VAR MI GÖZLE KONTROL EDILIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• ELEKTRIK KABLO IZOLASYONU VE ŞASE BAĞLANTILARI KONTROL EDILIR.\n• PEDAL MEKANIZMASI (VEYA LMAN SESLERI VE KAYIŞ/DIŞLI BOŞLUKLARI KONTROL EDILIR.\n\n==============================": "S-MKN.A01.07.10", "🛠️ YAMAHA ROBOT\nKOD: S-MKN.A01.08.03\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 MAKINE IÇINDE GENEL TEMIZLIK YAPILIR,GEREKSIZ MALZEMELER IÇINDEN ÇIKARILIR.\n• MADDE-2 TUTUCU VE ÇAKMA UCU GIBI KISIMLARDA GEVŞEME,YAMULMA VEYA YABANCI MADDE VARMI KONTROL EDILIR.\n• MADDE-3 ELEKTRIK KONTROL KISMINDA TEST PIMLERININ SAĞLAMLIĞI KONTROL EDILIR.\n• MADDE-4 PNÖMATIK HORTUMDA KAÇAK OLUP OLMADIĞINA BAKILIR.MANYETIK SENSÖRLERIN ÇALIŞMA DURUMUNA BAKILIR.\n• MADDE-5 YUKARIDAKI MADDELER DE OLUMSUZ BIR DURUM YOK ISE TEST ÜRÜNÜ YUVAYA EKLENEREK ÜRETIME HAZIR HALE GELIR.\n• YOK\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• HAREKETLI AKSAMDA SIKIŞAN PARÇALAR TEMIZLENIR.\n• ZINCIR/BANT GERGINLIĞI ELLE KONTROL EDILIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• REDÜKTÖR VE MOTOR BAĞLANTI CIVATALARI SIKILIR.\n• MOTOR FAN IZGARASI TEMIZLENIR.\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• TAHRIK TAMBURU VE AVARE RULO RULMANLARI KONTROL EDILIR.\n• RULMANLARA GRES BASILIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• ELEKTRIK PANOSU IÇI VAKUMLA TEMIZLENIR.\n• KLEMENS BAĞLANTILARI TORKLANIR.\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• BANT/KAYIŞ SÖKÜLEREK ALT YATAK TEMIZLIĞI YAPILIR.\n• YIPRANMIŞ BANT/KAYIŞ YENISIYLE DEĞIŞTIRILIR.\n\n==============================": "S-MKN.A01.08.03", "🛠️ GÖVDE PRESLEME ROBOTU (KABLOLU SINYAL)\nKOD: S-MKN.A01.08.04\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1: PRESLEME ALANI (KALIP IÇI) HAVA TUTULARAK ÇAPAK VE YAĞ ARTIKLARINDAN TEMIZLENIR.\n• MADDE-2: IŞIK PERDESI (SENSÖRLER) VE ACIL STOP BUTONUNUN MAKINEYI DURDURDUĞU TEST EDILIR.\n• MADDE-3: MAKINE HAVA BASINCI  KONTROL EDILIR VE PNÖMATIK HORTUMLARDA HAVA KAÇAK SESI VAR MI DINLENIR.\n• MADDE-4: PRES KAFASINDA VEYA PISTON KEÇELERINDE YAĞ/HAVA KAÇAĞI VAR MI BAKILIR.\n• MADDE-5: ÇIFT EL BUTONLARININ (VEYA PEDALIN) TAKILMADAN EŞ ZAMANLI ÇALIŞTIĞI KONTROL EDILIR.\n• YOK\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• DÖNER TABLA YUVALARI VE PRESLEME KAFALARI METAL ÇAPAKLARDAN TEMIZLENIR.\n• PNÖMATIK GIRIŞ BASINCI (6 BAR) VE ŞARTLANDIRICI TAHLIYESI KONTROL EDILIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• HMI EKRAN YÜZEYI TEMIZLENIR VE DOKUNMATIK TEPKI HIZI KONTROL EDILIR.\n• IŞIK BARIYERI, EMNIYET SWITCHLERI VE ACIL STOP FONKSIYON TESTI YAPILIR.\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• PARÇA ALGILAMA SENSÖRLERININ BAĞLANTI VE POZISYON DOĞRULUĞU KONTROL EDILIR.\n• HAVA HORTUMLARI VE REKORLARDA SIZDIRMAZLIK KONTROLÜ YAPILIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• HMI EKRAN PARAMETRE YEDEĞI (BACKUP) ALINIR VE PANO KLEMENSLERI KONTROL EDILIR.\n• DÖNER TABLA MEKANIK BOŞLUK VE SABITLEME TORK KONTROLÜ YAPILIR.\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• PNÖMATIK SILINDIR VE VALF GRUBU KEÇELERI SIZDIRMAZLIK YÖNÜNDEN YENILENIR.\n• PRESLEME KUVVETI VE DALMA DERINLIĞI (STROK) KUMPAS/MASTAR ILE KALIBRE EDILIR.\n\n==============================": "S-MKN.A01.08.04", "🛠️ INKJET GÖVDE MARKALAMA ROBOTU(TERMINALLI SINYAL)\nKOD: S-MKN.A01.08.05\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 SILIKON TAMPONUN YÜZEYINDE BIR YIRTILMA,EZILME VARMI BAKILIR.\n• MADDE-2 METAL YUVA DA GEVŞEKLIK VARMI BAKILIR SONRA BOYA DAMLASI VEYA TOZ VAR ISE TEMIZLENIR.\n• MADDE-3 MÜREKKEP HAZNESINDEN KLIŞE ÜZERINE MÜREKKEP SIZIYORMU BAKILIR.\n• MADDE-4  PNÖMATIK BASINÇ GÖSTERGE PANELI KONTROL EDILIR.KAÇAK DINLENIR VAR ISE BAKIM PERSONELI BILGILENDIRILIR.\n• MADDE-5 VAR ISE ACIL STOP BUTONU TEST EDILEREK ÜRETIME HAZIR HALE GELIR.\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• SILIKON TAMPON VE KLIŞE ÜZERINDEKI KURUMUŞ BOYALAR SOLVENT ILE TEMIZLENIR.\n• BOYA HAZNESI SERAMIK BILEZIĞI SIZDIRMAZLIK VE KURUMA YÖNÜNDEN KONTROL EDILIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• BASKI KAFASI HAREKETLI KIZAK MILLERI INCE YAĞ ILE YAĞLANIR.\n• PNÖMATIK ŞARTLANDIRICI SU TAHLIYESI VE 6 BAR BASINÇ KONTROLÜ YAPILIR.\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• TAMPON BASKI MERKEZI (X-Y) VE STROK DERINLIK AYARI KONTROL EDILIR.\n• AYAK PEDALI VE PANEL BUTONLARININ FONKSIYON TESTI YAPILIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• PNÖMATIK SILINDIR VE VALF KEÇELERI HAVA KAÇAĞINA KARŞI KONTROL EDILIR.\n• PISTON BAĞLANTI CIVATALARI VE ŞOK EMICILERIN DURUMU KONTROL EDILIR.\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• BOYA HAZNESI SERAMIK BIÇAĞI (DOCTOR RING) AŞINMA KONTROLÜ YAPILIR, GEREKIRSE DEĞIŞIR.\n• HAVA HORTUMLARI SERTLEŞME VE ÇATLAMAYA KARŞI KONTROL EDILEREK YENILENIR.\n\n==============================": "S-MKN.A01.08.05", "🛠️ B20 ANAHTAR ÇAKMA VE KONTROL ROBOTU (TUŞLU-3)\nKOD: S-MKN.A01.08.07\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 ANAHTARIN DÖKÜLDÜĞÜ BEYAZ HAZNEDE KAĞIT,VIDA PARÇASI ISE TEMIZLENIR,PARÇALARIN ILERLEDIĞI METAL KANALLAR KONTROL EDILIR.\n• MADDE-2 MAKINANIN ETRAFINDAKI ŞEFFAF KAPILAR MAKINE ÇALIŞIRKEN AÇILIRSA DURUYORMU BAKILIR.\n• MADDE-3 ACIL STOP BUTONU VAR ISE DIĞER EMNIYET SWITCHLERI KONTROL EDILIR.\n• MADDE-4 ÇAKMA KAFASI VE TUTUCUNUN TEMIZ OLDUĞU KONTROL EDILIR.\n• MADDE-5 PNÖMATIK HATTA KAÇAK OLUP OLMADIĞI KONTROL EDILIR,MANYETIK SENSÖRLERIN ÇALIŞIP ÇALIŞMADIĞINA BAKILIR.\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• VIBRASYON ÇANAĞI VE ÇIKIŞ YOLU PLASTIK TOZLARINDAN VAKUMLA TEMIZLENIR.\n• OPTIK VE İNDÜKTIF SENSÖRLERIN ALGILAYICI YÜZEYLERI TOZ/YAĞDAN TEMIZLENIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• ÇAKMA ISTASYONU PISTON MILLERI VE KILAVUZLARI YAĞLANIR.\n• SENSÖR SINYAL IŞIKLARININ (LED) PARÇA GÖRDÜĞÜNDE YANDIĞI KONTROL EDILIR.\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• OPTIK SENSÖR LENSLERI TEMIZLENIR VE SINYAL TESTI YAPILIR.\n• SENSÖR KABLOLARINDA KIRILMA ERI PENS AMPERMETRE ILE ÖLÇÜLEREK EKRANDAKI DEĞERLE DOĞRULANIR\n\n==============================": "S-MKN.A01.12.01", "🛠️ ENJEKSIYON MAKINELERI NO:1\nKOD: S-MKN.A02.01.01\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 MAKINANIN TÜM ÇEVRESI TEMIZLIĞI KONTROL EDILIR VE ÇEVRE  GÜVENLIK SAĞLANIR.\n• MADDE-2 GÜVENLIK TERTIBATLARI (KAPI SWITCHLERI,ACIL STOP,KORUMA KAPAKLARI) KONTROLÜ YAPILIR.(MAKINE KAPISINI AÇARAK MENGENE ILERI TUŞUNA BASILMALI)\n• MADDE-3 KALIP VE HORTUMLARDA  SU KAÇAĞI KONTROL EDILMELI.(GÖZLE KONTROL)\n• MADDE-4 MAKINE ENJEKSIYON GRUBUNDA MALZEME KAÇAĞI KONTROL EDILMELI.\n• MADDE-5 DENEME ÜRÜNÜ TEST EDILIR.KALITE KONTROL YAPILARAK ÜRETIME HAZIR HALE GELIR.\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• ÖN/ARKA KAPI EMNIYET SWITCHLERI VE MEKANIK KILITLER TEST EDILIR.\n• MERKEZI YAĞLAMA SEVIYESI VE MENGENE MAKAS YAĞLANMASI KONTROL EDILIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• HIDROLIK YAĞ SEVIYESI, SICAKLIĞI VE FILTRE KIRLILIK GÖSTERGESI KONTROL EDILIR.\n• PLAKA YÜZEYLERI TEMIZLENIR VE KALIP PABUÇLARI SIKILIK KONTROLÜ YAPILIR.\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• OCAK REZISTANS AKIMLARI ÖLÇÜLÜR, TERMOKUPL GEVŞEKLIKLERI KONTROL EDILIR.\n• MEME (PÜSKÜRTME UCU (NOZZLE)) GRUBU KAÇAK KONTROLÜ VE MERKEZLEME AYARI YAPILIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• KOLON  SOMUN BOŞLUKLARI VE MENGENE PARALELLIĞI KONTROL EDILIR.\n• YAĞ EŞANJÖRÜ VE SU HATLARINDA KIREÇ/TIKANIKLIK KONTROLÜ YAPILIR.\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• HIDROLIK YAĞ ANALIZI YAPILIR (VEYA DEĞIŞIR) VE FILTRELER YENILENIR.\n• VIDA-KOVAN (OCAK) AŞINMA KONTROLÜ VE ÇEK VALF (YÜZÜK) TESTI YAPILIR.\n\n==============================": "S-MKN.A02.01.01", "🛠️ ENJEKSIYON MAKINELERI NO:2\nKOD: S-MKN.A02.01.02\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 MAKINANIN TÜM ÇEVRESI TEMIZLIĞI KONTROL EDILIR VE ÇEVRE  GÜVENLIK SAĞLANIR.\n• MADDE-2 GÜVENLIK TERTIBATL IK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• NUMUNE ÜZERINDEN BÜKÜM AÇISI DOĞRULUĞU KONTROL EDILIR.\n• KALIP SIKMA PABUÇLARI VE STOPER CIVATALARININ TORKU KONTROL EDILIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• HAREKETLI MAFZALLARIN YAĞLANMASI SAĞLANIR.\n• HIDROLIK BORULAR TEMIZLENIR RAKORLARIN SAĞLAMLIĞI VE SIKILIĞI KONTROL EDILIR.\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• BÜKME KALIPLARINDA EZILME VE KÖRELME KONTROLÜ YAPILIR.\n• MAKINE GÖVDESI VE BÜKÜM ÇENESINDE PARALELLIK KONTROLÜ YAPILIR.\n\n==============================": "S-MKN.A02.03.26", "🛠️ MASA TIPI HIDROLIK PRES_1 (TUŞLU 1-2)\nKOD: S-MKN.A02.03.27\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 MAKINE ETRAFI GÜVENLIĞI ALINIR.KALIP BAĞLANTISI KONTROL EDILIP TEMIZLIK YAPILIR.\n• MADDE-2 HIDROLIK HATLARDA KAÇAK VE SIZDIRMAZLIK KONTROLÜ YAPILIR\n• MADDE-3 SISTEMDE ELEKTRIK ILE KORUMA VARSA CIFT EL BUTONU  VE ACIL STOP  KONTROLÜ YAPILIR.\n• MADDE-4  MEKANIK VE GEREKLI HAREKETLI AKSAMIN YAĞLANMA ORANI KONTROL EDILIR.TITREME SÜRTÜNME SESI VARMI BAKILIR.\n• MADDE -5  DENEME ÜRÜNÜ YERLEŞTIRILEREK ÜRÜN TESTI YAPILIR KALITE KONTROL SAĞLANARAK ÜRETIME HAZIR HALE GELIR.\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• HIDROLIK YAĞ SEVIYESI VE SICAKLIK GÖSTERGESI KONTROL EDILIR.\n• PRES TABLASI VE KOLON MILLERI (RAM) TEMIZLENIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• KOLON MILLERI VE KIZAK YOLLARI GRES ILE YAĞLANIR.\n• IŞIK BARIYERI VE ÇIFT EL BUTON GÜVENLIK TESTI YAPILIR.\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• HIDROLIK HORTUM VE REKORLARDA SIZDIRMAZLIK/TERLEME KONTROLÜ YAPILIR.\n• ELEKTRIK PANOSU VE MOTOR FAN TEMIZLIĞI YAPILIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• YAĞ SOĞUTUCU (EŞANJÖR/FAN) PETEKLERI TEMIZLENIR.\n• GÖVDE VE MOTOR BAĞLANTI CIVATALARI TORKLANIR.\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• HIDROLIK YAĞ VE DÖNÜŞ FILTRESI DEĞIŞTIRILIR.\n• SISTEM BASI  6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• JENERATÖR GÜÇ ÜNITESI TEMIZLIĞI VE ELEKTRIK BAĞLANTI KONTROLÜ YAPILIR.\n• EKSENLERIN MEKANIK GEOMETRISI VE BOŞLUK (BACKLASH) AYARLARI KONTROL EDILIR.\n\n==============================": "S-MKN.A09.05.03", "🛠️ ALET BILEME\nKOD: S-MKN.A09.07.01\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 DÖNEN ZIMPARA TAŞINDA ÇATLAK,KIRIK VEYA KENAR ATMASI VAR MI BAKILIR.\n• MADDE-2 MAKINANIN KIZAK YOLLARINDA ZIMPARA KUMU VARMI BAKILIR.MEVCUT ISE TEMIZLENIR.\n• MADDE-3 ACIL STOP BUTONU VAR ISE DIĞER EMNIYET SWITCHLERI KONTROL EDILIR.\n• MADDE-4 SIYAH ÇEVIRME KOLLARI RAHAT DÖNÜYOR MU BAKILIR.\n• MADDE-5 KABLOLARDA EZILME-SIYRILMA VEYA DEFORMASYON VAR ISE BAKIM PERSONELI BILGILENDIRILIR.\n• YOK\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• TAŞLAMA TAŞI MUHAFAZASI VE GÖVDE METAL TOZLARINDAN TEMIZLENIR.\n• TAŞ YÜZEYINDE ÇATLAK, KIRIK VEYA DOLULUK KONTROLÜ YAPILIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• ACIL STOP VE ŞEFFAF KORUYUCU SIPERLIKLERIN SAĞLAMLIĞI TEST EDILIR.\n• HAREKETLI KIZAK MILLERI VE AYAR KOLLARI INCE YAĞ ILE YAĞLANIR.\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• TAŞ YÜZEYI ELMAS ILE DÜZELTILIR (DRESSING) VE PROFILI AÇILIR.\n• DAYAMA SEHPASI ILE TAŞ ARASINDAKI GÜVENLIK BOŞLUĞU (MAKS 3MM) AYARLANIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• MOTOR BALANSSIZLIĞI (TITREŞIM) VE RULMAN SESI DINLENIR.\n• AYDINLATMA LAMBASI VE KABLO IZOLASYONLARI KONTROL EDILIR.\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• TAŞ SÖKÜLEREK MIL SALGISI (RUN-OUT) KONTROL EDILIR.\n• TAŞ ÇAPI LIMIT ALTINDAYSA VEYA ÖMRÜ DOLDUYSA YENILENIR.\n\n==============================": "S-MKN.A09.07.01", "🛠️ TAŞ MOTORU\nKOD: S-MKN.A09.08.01\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 MAKINE ÇEVRESINDEKI VE KORUYUCU KAPAK IÇINDEKI METAL TOZLARI/ÇAPAKLAR TEMIZLENIR.\n• MADDE-2 ZIMPARA TAŞINDA GÖZLE GÖRÜLÜR ÇATLAK, KIRIK VEYA YALPA (BALANSSIZLIK) KONTROLÜ YAPILIR.\n• MADDE-3 ŞEFFAF ÇAPAK SIPERLIĞI (GÖZ KORUYUCU) VE YAN KAPAKLARIN SAĞLAMLIĞI KONTROL EDILIR.\n• MADDE-4 İŞ PARÇASI DAYAMA DEMIRI ILE TAŞ ARASINDAKI BOŞLUK KONTROL EDILIR (MAKSIMUM 3MM OLMALIDIR).\n• MADDE-5 ACIL STOP BUTONU VE AÇMA/KAPAMA ŞALTERININ ÇALIŞIRLIĞI TEST EDILIR.\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• TAŞLAMA TAŞI MUHAFAZASI VE GÖVDE METAL TALAŞLARDAN TEMIZLENIR.\n• TAŞ YÜZEYINDE GÖRÜNÜR ÇATLAK, KIRIK VEYA AŞINMA KONTROLÜ YAPILIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• ŞEFFAF ÇAPAK KORUYUCU SIPERLIKLERIN SAĞLAMLIĞI VE AYARI KONTROL EDILIR.\n• TAŞIN BALANSSIZ (TITREŞIMLI) DÖNÜP DÖNMEDIĞI KONTROL EDILIR.\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• TAŞLAMA SEHPASI (TOOL REST) ILE TAŞ ARASINDAKI BOŞLUK KONTROL EDILIR (MAKS 3MM).\n• SABITLEME PABUÇLARI VE GÖVDE CIVATALARININ SIKILIĞI KONTROL EDILIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• MOTOR MIL RULMAN SESLERI DINLENIR VE ISINMA KONTROLÜ YAPILIR.\n• ELEKTRIK KABLOSU, FIŞ VE ŞALTERIN SAĞLAMLIĞI KONTROL EDILIR.\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• TAŞ ÇAPI LIMIT ALTINA DÜŞTÜYSE VEYA ÖMRÜ DOLDUYSA YENILENIR.\n• GENEL GÖVDE BÜTÜNLÜĞÜ VE KOROZYON KONTROLÜ YAPILARAK REVIZE EDILIR.\n\n==============================": "S-MKN.A09.08.01", "🛠️ KLIMA SWITCH MONTAJ ROBOTU\nKOD: S-MKN.M01.08.02\n==============================\n\n📌 [GÜNLÜK BAKIM]\n• MADDE-1 MAKINANIN ÇEVRE GÜVENLIĞI SAĞLANIR.MAKINE ÇEVRESI TEMIZLENIR.\n• MADDE-2 ARDINDAN FIKSTÜR,YUVA VE SENSÖR TEMIZLIĞI YAPILIR\n• MADDE-3 PNÖMATIK/HIDROLIK SIZDIRMAZLIK VE BASINÇ KONTROLÜ YAPILIR.\n• MADDE-4 ACIL STOP BUTONU ,ÇIFT EL BUTONU (VAR ISE IŞIK PERDESI)  VE KORUYUCU KAPAĞIN SAĞLAMLIK KONTROLÜ YAPILIR.BUNLARDAN HERHANGI BIRINDE SORUN VAR ISE YETKILIYE BILDIRILIR:\n• MADDE-5 NUMUNE PARÇA TEST EDILIR KALITE KONTROL SAĞLANDIKTAN SONRA MAKINE ÜRETIME HAZIR HALE GELIR.\n\n📅 HAFTALIK\n• GÜNLÜK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• TAŞIYICI YUVALAR (PARÇA YUVASI (NEST)) VE HAT ÜZERINDEKI ÇAPAKLAR VAKUMLA TEMIZLENIR.\n• PNÖMATIK GIRIŞ BASINCI (6 BAR) KONTROL EDILIR VE ŞARTLANDIRICI TAHLIYESI YAPILIR.\n\n📅 AYLIK\n• HAFTALIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• PISTON HAREKETI KONTROL EDILIR HAREKETLI MAFZALLAR YAĞLANIR.\n• İNGUN SAĞLAMLIK KONTROLÜ YAPILIR\n\n📅 3 AYLIK\n• AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• ACIL STOP VE IŞIK BARIYERLERININ EMNIYET FONKSIYON TESTI YAPILIR.\n• PNÖMATIK SENSÖRLERIN AYAR KONTROLÜ YAPILIR.\n\n📅 6 AYLIK\n• 3 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• PANO IÇI FAN FILTRELERI TEMIZLENIR VE KLEMENS TORK KONTROLLERI YAPILIR.\n• MEKANIK ŞASI BAĞLANTILARI VE TITREŞIM TAKOZLARI KONTROL EDILIR.\n\n📅 YILLIK\n• 6 AYLIK BAKIM PROSEDÜRÜ EKSIKSIZ UYGULANIR.\n• MONTAJ PRESLEME KUVVETI VE STROK KALIBRASYONU (ALIGNMENT) YAPILIR.\n• PNÖMATIK SILINDIR VE VALF KEÇELERI SIZDIRMAZLIK YÖNÜNDEN REVIZE EDILIR.\n\n==============================": "S-MKN.M01.08.02"};
const creds = {'Harun Özüpek':'1354','Fatih Kır':'2111','Mehmet Emin Tunçay':'2079','Cengiz Küçük':'1353','Hasan Kaya':'2151'};
let currentMakine = "";

// YENİ EKLENEN FOTOĞRAF DEĞİŞKENİ
let base64Foto = ""; 

window.onload = function() {
    let path = window.location.pathname.split('/').filter(Boolean).pop() || "";
    let code = decodeURIComponent(path).replace(".html", "").trim().toUpperCase();
    const urlParams = new URLSearchParams(window.location.search);
    let finalCode = urlParams.get('code') || urlParams.get('id') || code;

    if (finalCode && finalCode !== "INDEX") {
        let machineCode = qrs[finalCode];
        if (machineCode) {
            document.getElementById('manual_kod').value = machineCode;
            kodDegisti(); 
        } else {
            document.getElementById('manual_kod').value = finalCode;
            kodDegisti();
        }
    }
};

function kodDegisti() {
    let val = document.getElementById('manual_kod').value.trim().toUpperCase();
    currentMakine = val;
    if (data[val]) {
        document.getElementById('baslik').innerText = data[val].ad;
    } else {
        document.getElementById('baslik').innerText = "KOD: " + val;
    }
}

async function giris() {
    const pName = document.getElementById('p_name').value;
    const pPass = document.getElementById('pass').value;

    if(creds[pName] === pPass) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('main-form').classList.remove('hidden');
        
        // 🔴 BAŞLANGIÇ BİLDİRİMİ
        const startData = new URLSearchParams();
        startData.append("Durum", "BAŞLADI");
        startData.append("Personel", pName);
        startData.append("Makine", currentMakine);
        startData.append("MakineAdi", data[currentMakine] ? data[currentMakine].ad : "YENİ");
        
        try { fetch("https://script.google.com/macros/s/AKfycbz9AwdaGX7XPy8lNHwuPnKAABKa-Ztf4kuIL6V8NbLl7-550u39PvFCp3vamLCND8VL/exec", { method: "POST", body: startData, mode: "no-cors" }); } catch (e) {}
        renderItems();
    } else { alert("❌ Şifre Hatalı!"); }
}

function renderItems() {
    const pKey = document.getElementById('pt').value;
    const container = document.getElementById('dynamic-items');
    container.innerHTML = "";
    if(!pKey || !currentMakine || !data[currentMakine]) return;
    
    // 🟠 BİRİKİMLİ GÖRÜNÜM (Cumulative View)
    let order = ["Günlük", "Haftalık", "Aylık", "3 Aylık", "6 Aylık", "Yıllık"];
    let idx = order.indexOf(pKey);
    let activePeriods = order.slice(0, idx + 1);

    activePeriods.forEach(p => {
        if(data[currentMakine][p] && data[currentMakine][p].length > 0) {
            let html = `<div class="item-group" data-period="${p}"><b>${p.toUpperCase()} KONTROLLERİ</b>`;
            data[currentMakine][p].forEach(m => {
                html += `<div class="item"><input type="checkbox" class="ck" data-p="${p}" value="${m.idx}"><span>${m.txt}</span></div>`;
            });
            container.innerHTML += html + "</div>";
        }
    });
}

// YENİ EKLENEN FOTOĞRAF SEÇME FONKSİYONU
function fotoSecildi(event) {
    const file = event.target.files[0];
    if (!file) return;

    const imgPreview = document.getElementById('foto-onizleme');
    imgPreview.style.display = "block";
    imgPreview.src = URL.createObjectURL(file);

    const reader = new FileReader();
    reader.onload = function(e) {
        base64Foto = e.target.result.split(',')[1]; 
    };
    reader.readAsDataURL(file);
}

async function veriyiGonder() {
    const groups = document.querySelectorAll('.item-group');
    let hasError = false;
    let errorPeriod = "";

    // 🔴 İŞARETLENMEMİŞ PERİYOT KONTROLÜ
    groups.forEach(group => {
        const cks = group.querySelectorAll('.ck');
        const allChecked = Array.from(cks).every(c => c.checked);
        if (!allChecked) {
            group.classList.add('error');
            if (!hasError) {
                hasError = true;
                errorPeriod = group.getAttribute('data-period');
            }
        } else {
            group.classList.remove('error');
        }
    });

    if(hasError) {
        alert("🛑 DİKKAT: " + errorPeriod.toUpperCase() + " periyodunda işaretlenmemiş maddeler var!");
        return;
    }

    const btn = document.getElementById('btn-gonder');
    btn.innerText = "GÖNDERİLİYOR..."; btn.disabled = true;

    const formData = new URLSearchParams();
    formData.append("Makine", currentMakine);
    formData.append("Personel", document.getElementById('p_name').value);
    formData.append("Periyot", document.getElementById('pt').value);
    formData.append("Notlar", document.getElementById('f_notlar').value);
    
    // YENİ EKLENEN FOTOĞRAFI FORMA DAHİL ETME İŞLEMİ
    if(base64Foto !== "") {
        formData.append("Fotograf", base64Foto);
    }
    
    const allCks = document.querySelectorAll('.ck');
    allCks.forEach(c => formData.append("Yapilan_Islemler", c.value));

    try {
