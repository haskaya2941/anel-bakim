<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anel Bakım Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #eceff1; padding: 10px; margin: 0; }
        .card { background: white; border-radius: 15px; max-width: 450px; margin: auto; border-top: 6px solid #1a237e; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #1a237e; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #37474f; }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 2px solid #cfd8dc; font-size: 16px; box-sizing: border-box; }
        #btn-gonder { width: 100%; padding: 15px; margin-top: 20px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; background: #1a237e; color:white; }
        .item-group { margin-top: 15px; background: #e8eaf6; padding: 15px; border-radius: 10px; border-left: 5px solid #1a237e; }
        .item { display: flex; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #d1d9e6; }
        input[type="checkbox"] { width: 24px; height: 24px; margin-right: 12px; accent-color: #1a237e; flex-shrink: 0; }
        .hidden { display: none; }
        .alert { background: #fff3e0; color: #e65100; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 10px; border: 1px solid #ffb74d; }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h2 id="baslik">ANEL BAKIM</h2>
        <input type="text" id="manual_kod" placeholder="KOD GİRİNİZ..." oninput="kodDegisti()" style="text-align:center; text-transform:uppercase; font-weight:bold; border:none; padding:8px; width:85%;">
    </div>
    <div class="content">
        <div id="login-section">
            <label>Personel:</label>
            <select id="p_name">
                <option value="Harun Özüpek">Harun Özüpek</option><option value="Fatih Kır">Fatih Kır</option>
                <option value="Mehmet Emin Tunçay">Mehmet Emin Tunçay</option><option value="Cengiz Küçük">Cengiz Küçük</option>
                <option value="Hasan Kaya">Hasan Kaya</option>
            </select>
            <label>Şifre:</label>
            <input type="number" id="pass" placeholder="****" inputmode="numeric">
            <button type="button" style="width:100%; padding:15px; margin-top:20px; border-radius:8px; background:#455a64; color:white; border:none; font-weight:bold;" onclick="giris()">SİSTEME GİRİŞ</button>
        </div>
        <div id="main-form" class="hidden">
            <div id="new-msg" class="alert hidden">⚠️ Makine sistemde kayıtlı değil.</div>
            <label>Bakım Periyodu:</label>
            <select id="pt" onchange="renderItems()">
                <option value="">Seçiniz...</option><option value="Günlük">Günlük</option>
                <option value="Haftalık">Haftalık</option><option value="Aylık">Aylık</option>
                <option value="3 Aylık">3 Aylık</option><option value="6 Aylık">6 Aylık</option>
                <option value="Yıllık">Yıllık</option>
            </select>
            <div id="dynamic-items"></div>
            <label>Notlar:</label>
            <textarea id="f_notlar" rows="3"></textarea>
            <button type="button" id="btn-gonder" onclick="veriyiGonder()">✅ KAYDI TAMAMLA</button>
        </div>
    </div>
</div>

const qrs = {};
const creds = {'Harun Özüpek':'1354','Fatih Kır':'2111','Mehmet Emin Tunçay':'2079','Cengiz Küçük':'1353','Hasan Kaya':'2151'};
let currentMakine = "";

// --- 🟢 QR OKUMA: SENİN İLK ÇALIŞAN MANTIĞIN + GÜVENLİK KİLİDİ ---
window.onload = function() {
    // 1. Linkin sonunu okur (örn: site.com/123)
    let path = window.location.pathname.split('/').filter(Boolean).pop() || "";
    let code = decodeURIComponent(path).replace(".html", "").trim().toUpperCase();
    
    // 2. Eğer parametreli linkse onu okur (örn: site.com/?code=123)
    const urlParams = new URLSearchParams(window.location.search);
    let finalCode = urlParams.get('code') || urlParams.get('id') || code;

    // 3. Ekrana zorla yazdırma mantığı
    if (finalCode && finalCode !== "INDEX" && !finalCode.includes("GITHUB")) {
        let actual = qrs[finalCode] || (data[finalCode] ? finalCode : null);
        
        // BULSA DA BULAMASA DA OKUDUĞUNU KUTUYA YAZACAK
        document.getElementById('manual_kod').value = actual ? actual : finalCode;
        kodDegisti(); 
    }
};

function kodDegisti() {
    let val = document.getElementById('manual_kod').value.trim().toUpperCase();
    currentMakine = val;
    if (data[val]) {
        document.getElementById('baslik').innerText = data[val].ad;
        document.getElementById('new-msg').classList.add('hidden');
        renderItems();
    } else if (val.length > 0) {
        document.getElementById('baslik').innerText = "YENİ MAKİNE";
        document.getElementById('new-msg').classList.remove('hidden');
        document.getElementById('dynamic-items').innerHTML = "";
    }
}

async function giris() {
    const pName = document.getElementById('p_name').value;
    const mKod = document.getElementById('manual_kod').value.trim().toUpperCase();
    if(creds[pName] === document.getElementById('pass').value) {
        document.getElementById('login-section').style.display='none';
        document.getElementById('main-form').classList.remove('hidden');

        // BİLDİRİM SİNYALİ
        const startData = new URLSearchParams();
        startData.append("Durum", "BAŞLADI"); 
        startData.append("Personel", pName);
        startData.append("Makine", mKod);
        startData.append("MakineAdi", data[mKod] ? data[mKod].ad : "YENİ");
        try { fetch("https://script.google.com/macros/s/AKfycbz9AwdaGX7XPy8lNHwuPnKAABKa-Ztf4kuIL6V8NbLl7-550u39PvFCp3vamLCND8VL/exec", { method: "POST", body: startData, mode: "no-cors" }); } catch (e) {}
    } else { alert("❌ Şifre Hatalı!"); }
}

function renderItems() {
    const pKey = document.getElementById('pt').value;
    const container = document.getElementById('dynamic-items');
    container.innerHTML = "";
    if(!pKey || !currentMakine || !data[currentMakine]) return;
    let keys = ["Günlük"];
    if(pKey === "Haftalık") keys.push("Haftalık");
    if(pKey === "Aylık") keys.push("Haftalık", "Aylık");
    if(pKey === "3 Aylık") keys.push("Haftalık", "Aylık", "3 Aylık");
    if(pKey === "6 Aylık") keys.push("Haftalık", "Aylık", "3 Aylık", "6 Aylık");
    if(pKey === "Yıllık") keys.push("Haftalık", "Aylık", "3 Aylık", "6 Aylık", "Yıllık");

    keys.forEach(k => {
        if(data[currentMakine][k]) {
            let html = `<div class="item-group"><b>${k.toUpperCase()}</b>`;
            data[currentMakine][k].forEach(m => {
                html += `<div class="item"><input type="checkbox" class="ck" value="${m.idx}"><span>${m.txt}</span></div>`;
            });
            container.innerHTML += html + "</div>";
        }
    });
}

async function veriyiGonder() {
    const cks = document.querySelectorAll('.ck');
    if(data[currentMakine] && cks.length > 0 && !Array.from(cks).every(c => c.checked)) {
        alert("🛑 Tüm maddeleri işaretleyin!"); return;
    }
    const btn = document.getElementById('btn-gonder');
    btn.innerText = "GÖNDERİLİYOR..."; btn.disabled = true;
    const formData = new URLSearchParams();
    formData.append("Makine", currentMakine);
    formData.append("Personel", document.getElementById('p_name').value);
    formData.append("Periyot", document.getElementById('pt').value);
    formData.append("Notlar", document.getElementById('f_notlar').value);
    cks.forEach(c => formData.append("Yapilan_Islemler", c.value));
    try {
        await fetch("https://script.google.com/macros/s/AKfycbz9AwdaGX7XPy8lNHwuPnKAABKa-Ztf4kuIL6V8NbLl7-550u39PvFCp3vamLCND8VL/exec", { method: "POST", body: formData, mode: "no-cors" });
        alert("✅ Kayıt Gönderildi!"); location.reload();
    } catch (e) { alert("❌ Hata!"); btn.disabled = false; btn.innerText = "TEKRAR DENE"; }
}
